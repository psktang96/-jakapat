  <div class="f-date"   id="dateVal">—</div>
  <div class="f-round"  id="roundVal">—</div>
  <div class="f-change">
    <div class="arr neu" id="arr">●</div>
    <div class="num neu" id="chgNum">—</div>
  </div>
  <div class="f-buy"  id="buyVal">—</div>
  <div class="f-sell" id="sellVal">—</div>

  <div class="btn-wrap">
    <button class="btn" id="btn" onclick="fetchGold()">
      <span id="ico">🔄</span> <span id="lbl">รีเฟรชราคาทอง</span>
    </button>
  </div>
</div>

<script>
const KEY='tws_prev';
function fmt(s){
  const n=parseFloat(String(s).replace(/,/g,''));
  return isNaN(n)?s:n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function setChg(diff){
  const a=document.getElementById('arr'),n=document.getElementById('chgNum');
  a.className='arr';n.className='num';
  if(diff==null){a.classList.add('neu');n.classList.add('neu');a.textContent='●';n.textContent='—';return;}
  const abs=Math.abs(diff).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(diff>0){a.classList.add('up');n.classList.add('up');a.textContent='▲';n.textContent='+'+abs;}
  else if(diff<0){a.classList.add('down');n.classList.add('down');a.textContent='▼';n.textContent=abs;}
  else{a.classList.add('neu');n.classList.add('neu');a.textContent='●';n.textContent='0.00';}
}
function loadPrev(){try{return JSON.parse(localStorage.getItem(KEY)||'null');}catch{return null;}}
function savePrev(o){try{localStorage.setItem(KEY,JSON.stringify(o));}catch{}}

async function fetchGold(){
  const btn=document.getElementById('btn'),lbl=document.getElementById('lbl'),ico=document.getElementById('ico');
  btn.classList.add('loading');ico.textContent='⏳';lbl.textContent='กำลังโหลด...';
  try{
    const res=await fetch('https://api.chnwt.dev/thai-gold-api/latest');
    const data=await res.json();
    if(data.status!=='success')throw new Error();
    const r=data.response;
    const bar=r.price.gold_bar||r.price.gold;
    const buyN=parseFloat(String(bar.buy).replace(/,/g,''));
    const tm=r.update_time.match(/(\d{1,2}:\d{2})/);
    const rnd=r.update_time.match(/ครั้งที่\s*(\d+)/);
    const [d,m,y]=(r.update_date||'').split('/');
    const roundNum=rnd?parseInt(rnd[1]):null;

    const stored=loadPrev();
    let prevBuy=null;
    if(stored){
      if(roundNum&&stored.round&&roundNum!==stored.round) prevBuy=stored.buy;
      else if(roundNum&&stored.round&&roundNum===stored.round) prevBuy=stored.prevBuy;
      else prevBuy=stored.buy;
    }

    document.getElementById('dateVal').textContent=(d?`${parseInt(d)}/${parseInt(m)}/${y}`:r.update_date||'—')+(tm?' '+tm[1]+' น.':'');
    document.getElementById('roundVal').textContent=roundNum||'—';
    document.getElementById('buyVal').textContent=fmt(bar.buy);
    document.getElementById('sellVal').textContent=fmt(bar.sell);
    setChg(prevBuy!=null?buyN-prevBuy:null);
    savePrev({buy:buyN,sell:parseFloat(String(bar.sell).replace(/,/g,'')),round:roundNum,prevBuy});

    ico.textContent='✅';lbl.textContent='อัพเดตแล้ว';
    setTimeout(()=>{ico.textContent='🔄';lbl.textContent='รีเฟรชราคาทอง';btn.classList.remove('loading');},2000);
  }catch(e){
    ico.textContent='❌';lbl.textContent='โหลดไม่สำเร็จ';btn.classList.remove('loading');
  }
}
fetchGold();
setInterval(fetchGold,5*60*1000);
</script>
