<script>
const HIST_KEY = 'tws_history';
const MAX_HIST = 200;

function fmt(s) {
  var n = parseFloat(String(s).replace(/,/g, ''));
  return isNaN(n) ? s : n.toLocaleString('th-TH', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function setChg(diff) {
  var a = document.getElementById('arr'), n = document.getElementById('chgNum');
  a.className = 'arr'; n.className = 'num';
  if (diff == null) { a.classList.add('neu'); n.classList.add('neu'); a.textContent = '●'; n.textContent = '—'; return; }
  var abs = Math.abs(diff).toLocaleString('th-TH', {minimumFractionDigits:0, maximumFractionDigits:0});
  if (diff > 0) { a.classList.add('up'); n.classList.add('up'); a.textContent = '▲'; n.textContent = '+' + abs; }
  else if (diff < 0) { a.classList.add('down'); n.classList.add('down'); a.textContent = '▼'; n.textContent = abs; }
  else { a.classList.add('neu'); n.classList.add('neu'); a.textContent = '●'; n.textContent = '0.00'; }
}
function loadHistory() { try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) { return []; } }
function saveHistory(h) { try { localStorage.setItem(HIST_KEY, JSON.stringify(h.slice(-MAX_HIST))); } catch(e) {} }

function findPrev(hist, dateStr, roundNum) {
  if (!roundNum) return null;
  if (roundNum > 1) {
    for (var i = hist.length-1; i >= 0; i--)
      if (hist[i].date === dateStr && hist[i].round === roundNum-1) return hist[i].buy;
    var best = null;
    for (var i = 0; i < hist.length; i++)
      if (hist[i].date === dateStr && hist[i].round < roundNum) best = hist[i];
    if (best) return best.buy;
  }
  var lastOther = null;
  for (var i = 0; i < hist.length; i++) if (hist[i].date !== dateStr) lastOther = hist[i];
  if (lastOther) return lastOther.buy;
  return null;
}

async function fetchGold() {
  var btn = document.getElementById('refreshBtn'), ico = document.getElementById('ico');
  btn.classList.add('spin');
  try {
    var res = await fetch('https://api.chnwt.dev/thai-gold-api/latest');
    var data = await res.json();
    if (data.status !== 'success') throw new Error();
    var r = data.response;
    var bar = r.price.gold_bar || r.price.gold;
    var buyN  = parseFloat(String(bar.buy ).replace(/,/g,''));
    var sellN = parseFloat(String(bar.sell).replace(/,/g,''));
    var tmM  = r.update_time.match(/(\d{1,2}:\d{2})/);
    var rndM = r.update_time.match(/ครั้งที่\s*(\d+)/);
    var pts  = (r.update_date||'').split('/');
    var dateStr  = pts[0] ? (parseInt(pts[0])+'/'+parseInt(pts[1])+'/'+pts[2]) : (r.update_date||'');
    var roundNum = rndM ? parseInt(rndM[1]) : null;
    var timeStr  = tmM  ? tmM[1] : '';
    var hist = loadHistory();
    var prevBuy = findPrev(hist, dateStr, roundNum);
    if (!hist.some(function(h){ return h.date===dateStr && h.round===roundNum; }) && roundNum) {
      hist.push({date:dateStr, round:roundNum, buy:buyN, sell:sellN});
      saveHistory(hist);
    }
    document.getElementById('dateVal').textContent  = dateStr + (timeStr ? ' '+timeStr+' น.' : '');
    document.getElementById('roundVal').textContent = roundNum || '—';
    document.getElementById('buyVal').textContent   = fmt(bar.buy);
    document.getElementById('sellVal').textContent  = fmt(bar.sell);
    setChg(prevBuy != null ? buyN - prevBuy : null);
    btn.classList.remove('spin'); ico.textContent = '✅';
    setTimeout(function(){ ico.textContent = '🔄'; }, 1500);
  } catch(e) {
    btn.classList.remove('spin'); ico.textContent = '❌';
    setTimeout(function(){ ico.textContent = '🔄'; }, 2000);
  }
}
fetchGold();
setInterval(fetchGold, 5*60*1000);
</script>
