<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#5a0000;display:flex;justify-content:center;min-height:100vh;font-family:'Kanit',sans-serif;}
.wrap{position:relative;width:100%;max-width:480px;}
.bg{width:100%;display:block;}

.f-date{position:absolute;top:23.4%;left:22.2%;width:73.2%;height:6.5%;display:flex;align-items:center;justify-content:center;font-size:5.5vw;font-weight:800;color:#cc0000;}
.f-round{position:absolute;top:33.6%;left:24.5%;width:29.1%;height:7.0%;display:flex;align-items:center;justify-content:center;font-size:6.5vw;font-weight:900;color:#cc0000;}
.f-change{position:absolute;top:33.6%;left:58.7%;width:35.5%;height:7.0%;display:flex;align-items:center;justify-content:center;gap:3%;}
.arr{font-size:7vw;line-height:1;}
.num{font-size:4.5vw;font-weight:800;line-height:1.2;}
.arr.up,.num.up{color:#007a38;}
.arr.down,.num.down{color:#cc0000;}
.arr.neu,.num.neu{color:#888;}
.f-buy{position:absolute;top:45.1%;left:33.3%;width:52.8%;height:12.4%;display:flex;align-items:center;justify-content:center;font-size:9vw;font-weight:900;color:#cc0000;}
.f-sell{position:absolute;top:62.4%;left:33.3%;width:52.9%;height:12.3%;display:flex;align-items:center;justify-content:center;font-size:9vw;font-weight:900;color:#cc0000;}

@media(min-width:480px){
  .f-date{font-size:26px;} .f-round{font-size:31px;}
  .arr{font-size:34px;} .num{font-size:22px;}
  .f-buy,.f-sell{font-size:43px;}
}

.refresh-btn{position:absolute;top:1.5%;right:2%;width:9vw;height:9vw;max-width:42px;max-height:42px;background:rgba(120,0,0,0.75);border:1.5px solid #c9960c;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:4.5vw;cursor:pointer;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.4);}
.refresh-btn.spin span{display:inline-block;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(min-width:480px){.refresh-btn{font-size:20px;}}

.phone-link{position:absolute;top:89.5%;left:0;width:55%;height:4%;cursor:pointer;}
.footer-links{position:absolute;top:93.8%;left:0;width:100%;height:6%;display:flex;}
.footer-link{flex:1;display:block;cursor:pointer;}
</style>

<script>
const HIST_KEY = 'tws_history';
const MAX_HIST = 200;

function fmt(s) {
  var n = parseFloat(String(s).replace(/,/g, ''));
  return isNaN(n) ? s : n.toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function setChg(diff) {
  var a = document.getElementById('arr'), n = document.getElementById('chgNum');
  a.className = 'arr'; n.className = 'num';
  if (diff == null) { a.classList.add('neu'); n.classList.add('neu'); a.textContent = '●'; n.textContent = '—'; return; }
  var abs = Math.abs(diff).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (diff > 0) { a.classList.add('up'); n.classList.add('up'); a.textContent = '▲'; n.textContent = '+' + abs; }
  else if (diff < 0) { a.classList.add('down'); n.classList.add('down'); a.textContent = '▼'; n.textContent = abs; }
  else { a.classList.add('neu'); n.classList.add('neu'); a.textContent = '●'; n.textContent = '0.00'; }
}
function loadHistory() { try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) { return []; } }
function saveHistory(h) { try { localStorage.setItem(HIST_KEY, JSON.stringify(h.slice(-MAX_HIST))); } catch(e) {} }

function findPrev(hist, dateStr, roundNum) {
  if (!roundNum) return null;
  if (roundNum > 1) {
    for (var i = hist.length-1; i >= 0; i--) {
      if (hist[i].date === dateStr && hist[i].round === roundNum-1) return hist[i].buy;
    }
    var best = null;
    for (var i = 0; i < hist.length; i++) {
      if (hist[i].date === dateStr && hist[i].round < roundNum) best = hist[i];
    }
    if (best) return best.buy;
  }
  var lastOther = null;
  for (var i = 0; i < hist.length; i++) { if (hist[i].date !== dateStr) lastOther = hist[i]; }
  if (lastOther) return lastOther.buy;
  return null;
}

async function fetchGold() {
  var btn = document.getElementById('refreshBtn'), ico = document.getElementById('ico');
  btn.classList.add('spin');
  try {
    var res = await fetch('https://api.chnwt.dev/thai-gold-api/latest');
    var data = await res.json();
    if (data.status !== 'success') throw new Error();
    var r = data.response;
    var bar = r.price.gold_bar || r.price.gold;
    var buyN  = parseFloat(String(bar.buy ).replace(/,/g,''));
    var sellN = parseFloat(String(bar.sell).replace(/,/g,''));
    var tmM  = r.update_time.match(/(\d{1,2}:\d{2})/);
    var rndM = r.update_time.match(/ครั้งที่\s*(\d+)/);
    var pts  = (r.update_date||'').split('/');
    var dateStr = pts[0] ? (parseInt(pts[0])+'/'+parseInt(pts[1])+'/'+pts[2]) : (r.update_date||'');
    var roundNum = rndM ? parseInt(rndM[1]) : null;
    var timeStr  = tmM  ? tmM[1] : '';
    var hist = loadHistory();
    var prevBuy = findPrev(hist, dateStr, roundNum);
    if (!hist.some(function(h){ return h.date===dateStr && h.round===roundNum; }) && roundNum) {
      hist.push({date:dateStr, round:roundNum, buy:buyN, sell:sellN});
      saveHistory(hist);
    }
    document.getElementById('dateVal').textContent  = dateStr + (timeStr ? ' '+timeStr+' น.' : '');
    document.getElementById('roundVal').textContent = roundNum || '—';
    document.getElementById('buyVal').textContent   = fmt(bar.buy);
    document.getElementById('sellVal').textContent  = fmt(bar.sell);
    setChg(prevBuy != null ? buyN - prevBuy : null);
    btn.classList.remove('spin'); ico.textContent = '✅';
    setTimeout(function(){ ico.textContent = '🔄'; }, 1500);
  } catch(e) {
    btn.classList.remove('spin'); ico.textContent = '❌';
    setTimeout(function(){ ico.textContent = '🔄'; }, 2000);
  }
}
fetchGold();
setInterval(fetchGold, 5*60*1000);
